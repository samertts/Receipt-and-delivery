name: Build Windows Release
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Build EXE
        run: pyinstaller --noconfirm --onefile --windowed --name LabReceiptSystem --icon=lab_system/assets/icons/app.ico main.py
      - name: Build installer (Inno Setup)
        run: |
          choco install innosetup -y
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" lab_system/installer/LabReceipt.iss
      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LabReceipt-windows-build
          path: |
            dist/LabReceiptSystem.exe
            lab_system/installer/Output/LabReceiptSetup.exe
      - name: Publish GitHub Release artifacts
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/LabReceiptSystem.exe
            lab_system/installer/Output/LabReceiptSetup.exe
