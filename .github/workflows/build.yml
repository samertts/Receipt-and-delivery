name: Build Windows Application

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        shell: cmd
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Verify Project Structure
        shell: cmd
        run: |
          echo Checking project structure...

          if not exist main.py (
          echo ERROR: main.py not found
          exit /b 1
          )

          if not exist assets (
          mkdir assets
          )

          if not exist assets\icons (
          mkdir assets\icons
          )

          echo Project structure verified successfully.

      - name: Verify VERSION File
        shell: cmd
        run: |
          if not exist VERSION (
            echo 1.0.0 > VERSION
            echo WARNING: VERSION file was missing, created with default 1.0.0
          )
          echo App version: 
          type VERSION

      - name: Verify Assets
        shell: powershell
        run: |
          $icon = "assets\icons\app.ico"
          if (-not (Test-Path $icon)) {
            Write-Host "WARNING: app.ico missing, building without icon"
          } elseif ((Get-Item $icon).Length -eq 0) {
            Write-Host "WARNING: app.ico is empty, building without icon"
          } else {
            Write-Host "app.ico exists and is valid"
          }
          Write-Host "Assets verification complete."

      - name: Build EXE
        shell: cmd
        run: |
          echo Starting PyInstaller build...

          pyinstaller --noconfirm --clean lab_system.spec

          if errorlevel 1 (
          echo ERROR: PyInstaller build failed
          exit /b 1
          )

          echo EXE build completed successfully.

      - name: Verify EXE Output
        shell: cmd
        run: |
          if not exist dist\LabReceiptSystem.exe (
          echo ERROR: EXE output not found
          exit /b 1
          )

          echo EXE verified successfully.

      - name: Install Inno Setup
        shell: cmd
        run: |
          choco install innosetup -y

      - name: Build Installer
        shell: cmd
        run: |
          ISCC installer/setup.iss

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: LabReceiptSystem
          path: dist/LabReceiptSystem.exe

      - name: Upload Setup
        uses: actions/upload-artifact@v4
        with:
          name: LabReceiptSetup
          path: installer/Output/LabReceiptSetup.exe

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/LabReceiptSystem.exe
            installer/Output/LabReceiptSetup.exe
