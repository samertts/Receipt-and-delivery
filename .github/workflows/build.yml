name: Build Windows Application

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        shell: cmd
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Verify Project Structure
        shell: cmd
        run: |
          echo Checking project structure...

          if not exist main.py (
            echo ERROR: main.py not found
            exit /b 1
          )

          if not exist assets (
            mkdir assets
          )

          if not exist assets\icons (
            mkdir assets\icons
          )

          echo Project structure verified successfully.

      - name: Create Placeholder Icon If Missing
        shell: powershell
        run: |
          if (!(Test-Path "assets/icons/app.ico")) {
            Add-Type -AssemblyName System.Drawing

            $bitmap = New-Object System.Drawing.Bitmap 256,256
            $graphics = [System.Drawing.Graphics]::FromImage($bitmap)
            $graphics.Clear([System.Drawing.Color]::RoyalBlue)

            $iconPath = "assets/icons/app.ico"
            $icon = [System.Drawing.Icon]::ExtractAssociatedIcon("$env:WINDIR\System32\notepad.exe")

            $stream = New-Object System.IO.FileStream($iconPath, [System.IO.FileMode]::Create)
            $icon.Save($stream)
            $stream.Close()

            $graphics.Dispose()
            $bitmap.Dispose()

            Write-Host "Placeholder icon created successfully."
          }
          else {
            Write-Host "Icon already exists."
          }

      - name: Build EXE
        shell: cmd
        run: |
          echo Starting PyInstaller build...

          pyinstaller ^
          --noconfirm ^
          --clean ^
          --onefile ^
          --windowed ^
          --name LabReceiptSystem ^
          --icon=assets/icons/app.ico ^
          main.py

          if errorlevel 1 (
            echo ERROR: PyInstaller build failed
            exit /b 1
          )

          echo EXE build completed successfully.

      - name: Verify EXE Output
        shell: cmd
        run: |
          if not exist dist\LabReceiptSystem.exe (
            echo ERROR: EXE output not found
            exit /b 1
          )

          echo EXE verified successfully.

      - name: Install Inno Setup
        shell: cmd
        run: |
          choco install innosetup -y

      - name: Build Installer
        shell: cmd
        run: |
          ISCC installer/setup.iss

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: LabReceiptSystem
          path: dist/LabReceiptSystem.exe

      - name: Upload Setup
        uses: actions/upload-artifact@v4
        with:
          name: LabReceiptSetup
          path: installer/Output/LabReceiptSetup.exe

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/LabReceiptSystem.exe
            installer/Output/LabReceiptSetup.exe
