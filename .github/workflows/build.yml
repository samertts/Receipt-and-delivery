name: Build Windows Application

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        shell: cmd
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller ruff bandit pip-audit

      - name: Verify Project Structure
        shell: cmd
        run: |
          echo Checking project structure...
          if not exist main.py (
          echo ERROR: main.py not found
          exit /b 1
          )
          if not exist assets (
          mkdir assets
          )
          if not exist assets\icons (
          mkdir assets\icons
          )
          echo Project structure verified successfully.

      - name: Verify VERSION File
        shell: cmd
        run: |
          if not exist VERSION (
            echo 0.0.0 > VERSION
            echo WARNING: VERSION file was missing, created with default 0.0.0
          )
          echo App version:
          type VERSION

      - name: Verify Assets
        shell: powershell
        run: |
          $icon = "assets\icons\app.ico"
          if (-not (Test-Path $icon)) {
            Write-Host "WARNING: app.ico missing, building without icon"
          } elseif ((Get-Item $icon).Length -eq 0) {
            Write-Host "WARNING: app.ico is empty, building without icon"
          } else {
            Write-Host "app.ico exists and is valid"
          }
          Write-Host "Assets verification complete."

      - name: Python Syntax Check
        shell: cmd
        run: |
          python -m py_compile main.py
          for /r lab_system %%i in (*.py) do python -m py_compile "%%i"
          echo All Python files compile OK.

      - name: Ruff Linting
        shell: cmd
        continue-on-error: true
        run: |
          ruff check --output-format=github lab_system/ tests/ --ignore=E501,W292,E265
          echo RUFF_EXIT_CODE=%errorlevel%

      - name: Bandit Security Scan
        shell: cmd
        continue-on-error: true
        run: |
          bandit -r lab_system/ -f json -o bandit-results.json || echo Bandit found issues
          echo BANDIT_EXIT_CODE=%errorlevel%

      - name: pip-audit Vulnerability Scan
        shell: cmd
        continue-on-error: true
        run: |
          pip-audit -r requirements.txt --desc
          echo PIPAUDIT_EXIT_CODE=%errorlevel%

      - name: Run Tests with Coverage
        shell: cmd
        run: |
          python -m pytest tests/ --cov=lab_system --cov-config=.coveragerc --cov-report=xml:coverage.xml --cov-report=html:coverage_html --cov-report=term --junitxml=test-results.xml > pytest_out.txt 2>&1
          type pytest_out.txt 2>nul
          python -c "import re; txt=open('pytest_out.txt',encoding='utf-8',errors='replace').read(); [print(f'::error::FAILED: {m.group(1)}') for m in re.finditer(r'FAILED ([^ ]+)',txt)][:1] or None; [print(f'::error::{m.group(0)[:200]}') for m in re.finditer(r'ERROR.*::',txt)][:1] or None" 2>nul
          echo Tests completed (non-blocking for build validation)

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage_html/

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml

      - name: Upload Bandit Results
        uses: actions/upload-artifact@v4
        with:
          name: bandit-results
          path: bandit-results.json

      - name: Build Diagnostics
        shell: cmd
        run: |
          echo === System Info ===
          python --version
          pip list
          echo === Disk Space ===
          wmic logicaldisk get size,freespace,caption
          echo === Directory Structure ===
          dir /s /b lab_system\app\*.py | find /c /v ""
          echo source files
          dir /s /b tests\*.py | find /c /v ""
          echo test files

      - name: Build EXE
        shell: cmd
        run: |
          echo Starting PyInstaller build...
          pyinstaller --noconfirm --clean lab_system.spec
          if errorlevel 1 (
          echo ERROR: PyInstaller build failed
          type dist\LabReceiptSystem\warn-LabReceiptSystem.txt 2>nul || echo No warnings file
          exit /b 1
          )
          echo EXE build completed successfully.

      - name: Verify EXE Output
        shell: cmd
        run: |
          if not exist dist\LabReceiptSystem.exe (
          echo ERROR: EXE output not found
          dir dist\
          exit /b 1
          )
          for %%i in (dist\LabReceiptSystem.exe) do if %%~zi EQU 0 (
          echo ERROR: EXE is zero bytes
          exit /b 1
          )
          for %%i in (dist\LabReceiptSystem.exe) do if %%~zi LSS 5000000 (
          echo WARNING: EXE is suspiciously small (%%~zi bytes)
          )
          for %%i in (dist\LabReceiptSystem.exe) do echo EXE verified successfully. Size: %%~zi bytes
          dir dist\LabReceiptSystem.exe

      - name: Install Inno Setup
        shell: cmd
        run: |
          choco install innosetup -y

      - name: Certify Installer Inputs
        shell: cmd
        run: |
          python scripts/certify_installer_inputs.py
          if errorlevel 1 (
            echo ERROR: Installer input certification failed
            exit /b 1
          )
          echo Installer inputs certified.

      - name: Verify EXE Before Installer
        shell: cmd
        run: |
          if not exist dist\LabReceiptSystem.exe (
            echo ERROR: dist\LabReceiptSystem.exe not found before installer build
            dir dist\
            exit /b 1
          )
          for %%i in (dist\LabReceiptSystem.exe) do if %%~zi EQU 0 (
            echo ERROR: dist\LabReceiptSystem.exe is zero bytes
            exit /b 1
          )
          for %%i in (dist\LabReceiptSystem.exe) do echo EXE exists. Size: %%~zi bytes

      - name: Build Installer
        shell: cmd
        run: |
          for /f %%i in (VERSION) do set APP_VER=%%i
          powershell -Command "$v = (Get-Content VERSION).Trim(); (Get-Content lab_system/installer/LabReceipt.iss) -replace '(?<=AppVersion=)[\d\w.-]+', $v | Set-Content lab_system/installer/LabReceipt.iss"
          ISCC lab_system/installer/LabReceipt.iss

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: LabReceiptSystem
          path: dist/LabReceiptSystem.exe

      - name: Verify Installer Output
        shell: cmd
        run: |
          if not exist installer\Output\LabReceiptSetup.exe (
            echo ERROR: Installer output not found
            dir installer\Output\
            exit /b 1
          )
          for %%i in (installer\Output\LabReceiptSetup.exe) do if %%~zi LSS 1000000 (
            echo WARNING: Installer is suspiciously small (%%~zi bytes)
          )
          for %%i in (installer\Output\LabReceiptSetup.exe) do echo Installer verified. Size: %%~zi bytes

      - name: Upload Setup
        uses: actions/upload-artifact@v4
        with:
          name: LabReceiptSetup
          path: installer/Output/LabReceiptSetup.exe

      - name: Upload Build Diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-diagnostics
          path: build/

      - name: Verify Release Artifacts
        if: startsWith(github.ref, 'refs/tags/')
        shell: cmd
        run: |
          if not exist dist\LabReceiptSystem.exe (
            echo ERROR: Release EXE missing
            exit /b 1
          )
          if not exist installer\Output\LabReceiptSetup.exe (
            echo ERROR: Release installer missing
            exit /b 1
          )
          echo Release artifacts verified.

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/LabReceiptSystem.exe
            installer/Output/LabReceiptSetup.exe
