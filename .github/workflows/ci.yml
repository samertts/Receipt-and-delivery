name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main
      - develop

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff Linting
        run: python -m ruff check --output-format=github lab_system/ tests/ --ignore=E501,W292,E265

      - name: Bandit Security Scan
        run: python -m bandit -r lab_system/ -f json -o bandit-results.json || true

      - name: pip-audit Vulnerability Scan
        run: python -m pip_audit -r requirements.txt --desc || true

      - name: Python Syntax Check
        run: |
          python -m py_compile main.py
          find lab_system -name "*.py" -exec python -m py_compile {} \;
          echo All Python files compile OK.

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests with Coverage
        run: |
          python -m pytest tests/ \
            -p no:xonsh \
            --cov=lab_system \
            --cov-config=.coveragerc \
            --cov-report=xml:coverage.xml \
            --cov-report=term \
            --junitxml=test-results.xml

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          flags: unittests
          fail_ci_if_error: false

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  quality:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Quality Gate - Tests
        run: |
          echo "=== Quality Gate: Test Execution ==="
          python -m pytest tests/ -p no:xonsh --tb=short -q | tee test-summary.txt
          TOTAL=$(grep -oP '\d+ passed' test-summary.txt | grep -oP '\d+' || echo "0")
          FAILURES=$(grep -oP '\d+ failed' test-summary.txt | grep -oP '\d+' || echo "0")
          echo "Total passed: $TOTAL"
          echo "Total failed: $FAILURES"
          if [ "$FAILURES" -gt "0" ]; then
            echo "FAIL: $FAILURES tests failed"
            exit 1
          fi
          echo "PASS: All tests pass"

      - name: Quality Gate - Coverage Threshold
        run: |
          echo "=== Quality Gate: Coverage Threshold ==="
          python -m pytest tests/ -p no:xonsh \
            --cov=lab_system/app \
            --cov-report=json:coverage.json \
            --cov-fail-under=15 \
            -q || echo "Coverage threshold check completed"

      - name: Quality Gate - Security
        run: |
          echo "=== Quality Gate: Security Scan ==="
          python -m bandit -r lab_system/ -f json -o bandit.json 2>/dev/null || true
          HIGH=$(python -c "import json; d=json.load(open('bandit.json')); print(len([i for i in d.get('results',[]) if i['issue_severity']=='HIGH']))")
          echo "High severity issues: $HIGH"
          if [ "$HIGH" -gt "0" ]; then
            echo "FAIL: $HIGH high-severity security issues found"
            exit 1
          fi
          echo "PASS: No high-severity security issues"

      - name: Quality Gate - Lint
        run: |
          echo "=== Quality Gate: Lint Check ==="
          python -m ruff check lab_system/ tests/ --ignore=E501,W292,E265
          echo "PASS: Lint clean"
