name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main
      - develop

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff Linting
        run: python -m ruff check --output-format=github lab_system/ tests/ --ignore=E501,W292,E265

      - name: Bandit Security Scan
        run: python -m bandit -r lab_system/ -f sarif -o bandit-results.sarif

      - name: pip-audit Vulnerability Scan
        run: python -m pip_audit -r requirements.txt --desc

      - name: Python Syntax Check
        run: |
          python -m py_compile main.py
          find lab_system -name "*.py" -exec python -m py_compile {} \;
          echo All Python files compile OK.

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests with Coverage
        run: |
          python -m pytest tests/ \
            --cov=lab_system \
            --cov-config=.coveragerc \
            --cov-report=xml:coverage.xml \
            --cov-report=term \
            --junitxml=test-results.xml

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          flags: unittests
          fail_ci_if_error: false

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
