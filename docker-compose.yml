version: '3.9'
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: lab_txn
      POSTGRES_USER: lab_user
      POSTGRES_PASSWORD: lab_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  backend:
    build: ./backend
    env_file: .env
    depends_on: [db]
    ports:
      - "8000:8000"
  frontend:
    build: ./frontend
    depends_on: [backend]
    ports:
      - "5173:5173"
volumes:
  pgdata:
