version: '3.9'

x-logging: &default-logging
  driver: json-file
  options:
    max-size: 10m
    max-file: 3

services:
  db:
    image: postgres:16-alpine
    container_name: lab_db
    environment:
      POSTGRES_DB: lab_txn
      POSTGRES_USER: lab_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Must set POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./deploy/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lab_user -d lab_txn"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging: *default-logging

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lab_backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://lab_user:${POSTGRES_PASSWORD}@db:5432/lab_txn
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - lab_data:/app/storage
    restart: unless-stopped
    logging: *default-logging

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: lab_frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    restart: unless-stopped
    logging: *default-logging

volumes:
  pgdata:
  lab_data:
